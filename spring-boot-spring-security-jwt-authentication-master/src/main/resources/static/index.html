<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Boot JWT Authentication</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #ff5252;
        }

        .toggle-form {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .toggle-form a {
            color: #667eea;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-form a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .hidden {
            display: none;
        }

        .user-info {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .user-info p {
            margin-bottom: 10px;
            color: #333;
            font-size: 14px;
        }

        .user-info strong {
            color: #667eea;
        }

        .role-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 12px;
            margin-right: 5px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Form -->
        <div id="loginForm">
            <div class="header">
                <h1>🔐 Login</h1>
                <p>Welcome back! Sign in to your account</p>
            </div>

            <div id="loginAlert" class="alert"></div>

            <form id="loginFormElement">
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter your username" required>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>

                <div class="loading" id="loginLoading">
                    <div class="spinner"></div> Logging in...
                </div>

                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>

            <div class="toggle-form">
                Don't have an account? <a onclick="toggleForms()">Sign up here</a>
            </div>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="hidden">
            <div class="header">
                <h1>📝 Sign Up</h1>
                <p>Create a new account</p>
            </div>

            <div id="signupAlert" class="alert"></div>

            <form id="signupFormElement">
                <div class="form-group">
                    <label for="signupUsername">Username</label>
                    <input type="text" id="signupUsername" placeholder="Choose a username" required>
                </div>

                <div class="form-group">
                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" placeholder="Enter password" required>
                </div>

                <div class="loading" id="signupLoading">
                    <div class="spinner"></div> Creating account...
                </div>

                <button type="submit" class="btn btn-primary">Sign Up</button>
            </form>

            <div class="toggle-form">
                Already have an account? <a onclick="toggleForms()">Sign in here</a>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="hidden">
            <div class="header">
                <h1>👋 Welcome!</h1>
                <p>You are logged in</p>
            </div>

            <div id="dashboardAlert" class="alert"></div>

            <div class="user-info" id="userInfo">
                <p><strong>Username:</strong> <span id="displayUsername"></span></p>
                <p><strong>Email:</strong> <span id="displayEmail"></span></p>
                <p><strong>Roles:</strong> <span id="displayRoles"></span></p>
            </div>

            <div style="margin-bottom: 20px; padding: 15px; background: #f0f0f0; border-radius: 5px;">
                <p style="font-size: 12px; color: #666; margin-bottom: 10px;">Your JWT Token:</p>
                <input type="text" id="tokenDisplay" readonly style="width: 100%; padding: 8px; font-size: 11px; font-family: monospace;">
                <button class="btn btn-secondary" onclick="copyToken()" style="margin-top: 10px;">📋 Copy Token</button>
            </div>

            <button class="btn btn-danger" onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080';

        // Toggle between login and signup forms
        function toggleForms() {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('signupForm').classList.toggle('hidden');
        }

        // Show alert
        function showAlert(elementId, message, type) {
            const alert = document.getElementById(elementId);
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 5000);
        }

        // Login
        document.getElementById('loginFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            document.getElementById('loginLoading').style.display = 'block';

            try {
                const response = await fetch(`${API_URL}/api/auth/signin`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.accessToken);
                    localStorage.setItem('user', JSON.stringify({
                        username: data.username,
                        email: data.email,
                        roles: data.roles
                    }));

                    displayDashboard();
                    showAlert('dashboardAlert', '✅ Login successful!', 'success');
                } else {
                    showAlert('loginAlert', `❌ ${data.message || 'Login failed'}`, 'error');
                }
            } catch (error) {
                showAlert('loginAlert', `❌ Error: ${error.message}`, 'error');
            } finally {
                document.getElementById('loginLoading').style.display = 'none';
            }
        });

        // Signup
        document.getElementById('signupFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('signupUsername').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;

            document.getElementById('signupLoading').style.display = 'block';

            try {
                const response = await fetch(`${API_URL}/api/auth/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('signupAlert', '✅ Account created! Please login.', 'success');
                    document.getElementById('signupFormElement').reset();
                    setTimeout(() => toggleForms(), 2000);
                } else {
                    showAlert('signupAlert', `❌ ${data.message || 'Signup failed'}`, 'error');
                }
            } catch (error) {
                showAlert('signupAlert', `❌ Error: ${error.message}`, 'error');
            } finally {
                document.getElementById('signupLoading').style.display = 'none';
            }
        });

        // Display dashboard
        function displayDashboard() {
            const user = JSON.parse(localStorage.getItem('user'));
            const token = localStorage.getItem('token');

            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('signupForm').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');

            document.getElementById('displayUsername').textContent = user.username;
            document.getElementById('displayEmail').textContent = user.email;

            const rolesHtml = user.roles.map(role => 
                `<span class="role-badge">${role}</span>`
            ).join('');
            document.getElementById('displayRoles').innerHTML = rolesHtml || '<span class="role-badge">USER</span>';

            document.getElementById('tokenDisplay').value = token;
        }

        // Copy token
        function copyToken() {
            const token = document.getElementById('tokenDisplay');
            token.select();
            document.execCommand('copy');
            showAlert('dashboardAlert', '✅ Token copied to clipboard!', 'info');
        }

        // Logout
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('loginFormElement').reset();
            showAlert('loginAlert', '👋 Logged out successfully', 'info');
        }

        // Check if user is already logged in
        window.addEventListener('load', () => {
            if (localStorage.getItem('token')) {
                displayDashboard();
            }
        });
    </script>
</body>
</html>
